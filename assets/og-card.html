<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f4f0e6;
    --ink: #1b1812;
    --muted: #6a6354;
    --terracotta: #c47a52;
  }
  * { margin: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; }
  .card {
    width: 1200px;
    height: 630px;
    background: var(--cream);
    color: var(--ink);
    padding: 84px 96px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
  }
  .monogram {
    font-family: "Space Mono", monospace;
    font-weight: 700;
    font-size: 30px;
    letter-spacing: 0.12em;
    color: var(--ink);
  }
  .name {
    font-family: "Cormorant Garamond", serif;
    font-weight: 600;
    font-size: 132px;
    line-height: 0.98;
    letter-spacing: 0.01em;
  }
  .rule {
    width: 96px;
    height: 3px;
    background: var(--terracotta);
    margin: 30px 0 26px;
  }
  .tagline {
    font-family: "Space Mono", monospace;
    font-size: 27px;
    letter-spacing: 0.06em;
    color: var(--muted);
  }
  .site {
    position: absolute;
    right: 96px;
    bottom: 84px;
    font-family: "Space Mono", monospace;
    font-size: 20px;
    letter-spacing: 0.08em;
    color: var(--muted);
  }
</style>
</head>
<body>
  <div class="card">
    <div class="monogram">HM</div>
    <div>
      <div class="name">Hayden Murphey</div>
      <div class="rule"></div>
      <div class="tagline">Software Engineer · Founder, Murphey Labs</div>
    </div>
    <div class="site">haydenmurphey.site</div>
  </div>
</body>
</html>
